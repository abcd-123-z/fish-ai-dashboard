<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fish Tank AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  padding:20px;
}

/* ===== HEADER ===== */

.title{
  text-align:center;
  margin-bottom:30px;
}

.title h1{
  color:#38bdf8;
  font-size:40px;
}

.title p{
  color:#94a3b8;
}

/* ===== CARD ===== */

.card-container{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:30px;
}

.card{
  background:rgba(30,41,59,0.9);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.05);
  width:280px;
  padding:25px;
  border-radius:25px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card h2{
  color:#94a3b8;
  margin-bottom:15px;
}

.value{
  font-size:40px;
  font-weight:bold;
}

.temp{ color:#38bdf8; }
.ph{ color:#22c55e; }

/* ===== DASHBOARD LAYOUT (FIXED) ===== */

.dashboard-layout{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  margin-top:20px;
}

.left-panel{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.right-panel{
  width:420px;
}

/* ===== GRAPH ===== */

.graph-card{
  background:#1e293b;
  width:650px;
  max-width:95vw;
  padding:20px;
  border-radius:25px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.graph-title{
  margin-bottom:20px;
  color:#e2e8f0;
}

canvas{
  background:#0f172a;
  border-radius:20px;
  padding:15px;
}

/* ===== CHAT ===== */

.chat-card{
  background:#1e293b;
  padding:20px;
  border-radius:25px;
}

#chatBox{
  height:520px;
  overflow-y:auto;
  background:#0f172a;
  padding:15px;
  border-radius:20px;
  margin-bottom:15px;
  text-align:left;
}

.user-message{
  margin-bottom:15px;
  color:#38bdf8;
}

.ai-message{
  margin-bottom:15px;
  color:white;
}

.input-area{
  display:flex;
  gap:10px;
}

#userInput{
  flex:1;
  padding:15px;
  border:none;
  border-radius:15px;
  outline:none;
  background:#334155;
  color:white;
}

.send-btn{
  padding:15px 20px;
  border:none;
  border-radius:15px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

.quick-buttons{
  margin-top:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.quick-buttons button{
  background:#334155;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:12px;
  cursor:pointer;
}

/* ===== MOBILE ===== */

@media(max-width:1200px){
  .dashboard-layout{
    flex-direction:column;
    align-items:center;
  }

  .right-panel{
    width:650px;
    max-width:95vw;
  }

  #chatBox{
    height:300px;
  }
}

@media(max-width:768px){
  .title h1{ font-size:30px; }
  .value{ font-size:30px; }
}

</style>
</head>

<body>

<!-- TITLE -->
<div class="title">
  <h1>🐠 Fish Tank AI Dashboard</h1>
  <p>ระบบวิเคราะห์คุณภาพน้ำอัจฉริยะ</p>
</div>

<!-- CARDS -->
<div class="card-container">

  <div class="card">
    <h2>🌡 อุณหภูมิ</h2>
    <div class="value temp" id="temp">-- °C</div>
  </div>

  <div class="card">
    <h2>🧪 ค่า pH</h2>
    <div class="value ph" id="ph">--</div>
  </div>

  <div class="card">
    <h2>⏰ เวลา</h2>
    <div class="value" id="time">--</div>
  </div>

</div>

<!-- DASHBOARD -->
<div class="dashboard-layout">

  <div class="left-panel">

    <div class="graph-card">
      <h2 class="graph-title">🌡 กราฟอุณหภูมิ</h2>
      <canvas id="tempChart"></canvas>
    </div>

    <div class="graph-card">
      <h2 class="graph-title">🧪 กราฟค่า pH</h2>
      <canvas id="phChart"></canvas>
    </div>

  </div>

  <div class="right-panel">

    <div class="chat-card">

      <h2 style="margin-bottom:20px;">🤖 AI Assistant</h2>

      <div id="chatBox"></div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="ถาม AI เกี่ยวกับตู้ปลา...">
        <button class="send-btn" onclick="sendMessage()">ส่ง</button>
      </div>

      <div class="quick-buttons">
        <button onclick="quickAsk('อุณหภูมิตอนนี้เป็นยังไง')">🌡 อุณหภูมิ</button>
        <button onclick="quickAsk('ค่า ph ตอนนี้เป็นยังไง')">🧪 pH</button>
        <button onclick="quickAsk('แนวโน้มของระบบเป็นยังไง')">📈 แนวโน้ม</button>
        <button onclick="quickAsk('ระบบกำลังทำงานปกติไหม')">⚙ ระบบ</button>
      </div>

    </div>

  </div>
</div>

<script>

// ===== SHEET =====
const sheetURL =
"https://docs.google.com/spreadsheets/d/1dRyT0iPaTrrxnfon_TEqO6rcdZSSHGwUGZG-H0KjZYQ/gviz/tq?tqx=out:csv";

let labels = [];
let temps = [];
let phs = [];

let tempChart;
let phChart;

// ===== LOAD DATA =====
async function loadData(){

  const res = await fetch(sheetURL);
  const text = await res.text();

  const rows = text.trim().split("\n");

  labels = [];
  temps = [];
  phs = [];

  for(let i=1;i<rows.length;i++){

    const cols = rows[i].split(",");

    const time = (cols[1] || "").replace(/"/g,'').trim();
    const temp = parseFloat(cols[2]);
    const ph = parseFloat(cols[3]);

    if(!isNaN(temp) && !isNaN(ph)){

      labels.push(time);
      temps.push(temp);
      phs.push(ph);
    }
  }

  const lastTemp = temps.at(-1) ?? 0;
  const lastPh = phs.at(-1) ?? 0;
  const lastTime = labels.at(-1) ?? "-";

  document.getElementById("temp").innerHTML = `${lastTemp} °C`;
  document.getElementById("ph").innerHTML = `${lastPh}`;
  document.getElementById("time").innerHTML = lastTime;

  drawCharts();
}

// ===== CHART =====
function drawCharts(){

  if(tempChart) tempChart.destroy();
  if(phChart) phChart.destroy();

  const tempCtx = document.getElementById("tempChart").getContext("2d");
  const phCtx = document.getElementById("phChart").getContext("2d");

  tempChart = new Chart(tempCtx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"อุณหภูมิ",
        data:temps,
        borderColor:"#38bdf8",
        tension:0.4,
        pointRadius:0,
        borderWidth:3
      }]
    }
  });

  phChart = new Chart(phCtx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"pH",
        data:phs,
        borderColor:"#22c55e",
        tension:0.4,
        pointRadius:0,
        borderWidth:3
      }]
    }
  });
}

// ===== CHAT =====
function addMessage(sender,text,type){

  const chatBox = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = type;
  div.innerHTML = `<b>${sender}:</b> ${text}`;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function quickAsk(text){
  document.getElementById("userInput").value = text;
  sendMessage();
}

async function sendMessage(){

  const input = document.getElementById("userInput");
  const question = input.value;

  if(!question.trim()) return;

  addMessage("คุณ",question,"user-message");
  input.value="";

  addMessage("AI","กำลังวิเคราะห์...","ai-message");

  try{

    const res = await fetch("/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ question })
    });

    const data = await res.json();

    const chatBox = document.getElementById("chatBox");
    chatBox.removeChild(chatBox.lastChild);

    addMessage("AI",data.result,"ai-message");

  }catch(e){
    addMessage("AI","เชื่อมต่อ AI ไม่สำเร็จ","ai-message");
  }
}

// ENTER
document.getElementById("userInput")
.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

// START
loadData();
setInterval(loadData,5000);

addMessage("AI","สวัสดี 😄 ผมคือ AI วิเคราะห์ตู้ปลา","ai-message");

</script>

</body>
</html>
