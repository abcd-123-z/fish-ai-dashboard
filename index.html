<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fish Tank AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:10px;
}

/* ===== TITLE ===== */
.title{
  text-align:center;
  margin-bottom:15px;
}

.title h1{
  color:#38bdf8;
  font-size:40px;
}

.title p{
  color:#94a3b8;
}

/* ===== TOP CARDS ===== */
.card-container{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.card{
  background:rgba(30,41,59,0.9);
  border-radius:20px;
  padding:20px;
  width:260px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.value{
  font-size:38px;
  font-weight:bold;
}

.temp{ color:#38bdf8; }
.ph{ color:#22c55e; }

/* ===== MAIN LAYOUT ===== */
.dashboard-layout{
  flex:1;
  display:flex;
  gap:15px;
  min-height:0;
}

/* LEFT PANEL */
.left-panel{
  flex:2;
  display:flex;
  flex-direction:column;
  gap:15px;
  min-height:0;
}

/* RIGHT PANEL */
.right-panel{
  flex:1;
  display:flex;
  min-height:0;
}

/* ===== COMMON CARD ===== */
.graph-card,
.chat-card{
  background:rgba(30,41,59,0.92);
  border-radius:18px;
  padding:15px;
  display:flex;
  flex-direction:column;
  flex:1;
  min-height:0;
}

/* ===== GRAPH ===== */
.graph-title{
  color:#94a3b8;
  margin-bottom:10px;
}

.graph-card canvas{
  flex:1;
  width:100% !important;
  height:100% !important;
}

/* ===== CHAT ===== */
.chat-card{
  display:flex;
  flex-direction:column;
}

#chatBox{
  flex:1;
  overflow-y:auto;
  background:rgba(15,23,42,0.6);
  border-radius:12px;
  padding:10px;
  min-height:0;
}

.user-message{
  margin-bottom:10px;
  color:#38bdf8;
}

.ai-message{
  margin-bottom:10px;
  color:white;
}

/* INPUT */
.input-area{
  display:flex;
  gap:10px;
  margin-top:10px;
}

#userInput{
  flex:1;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#334155;
  color:white;
  outline:none;
}

.send-btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

/* QUICK BUTTONS */
.quick-buttons{
  margin-top:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.quick-buttons button{
  background:#334155;
  border:none;
  padding:8px 12px;
  border-radius:10px;
  color:white;
  cursor:pointer;
}

/* ===== MOBILE ===== */
@media(max-width:900px){
  .dashboard-layout{
    flex-direction:column;
  }

  .title h1{
    font-size:30px;
  }

  .value{
    font-size:30px;
  }
}

</style>
</head>

<body>

<div class="title">
  <h1>🐠 Fish Tank AI Dashboard</h1>
  <p>ระบบวิเคราะห์คุณภาพน้ำอัจฉริยะ</p>
</div>

<!-- TOP CARDS -->
<div class="card-container">

  <div class="card">
    <h2>🌡 อุณหภูมิ</h2>
    <div class="value temp" id="temp">-- °C</div>
  </div>

  <div class="card">
    <h2>🧪 ค่า pH</h2>
    <div class="value ph" id="ph">--</div>
  </div>

  <div class="card">
    <h2>⏰ เวลา</h2>
    <div class="value" id="time">--</div>
  </div>

</div>

<!-- MAIN -->
<div class="dashboard-layout">

  <!-- LEFT -->
  <div class="left-panel">

    <div class="graph-card">
      <h2 class="graph-title">🌡 กราฟอุณหภูมิ</h2>
      <canvas id="tempChart"></canvas>
    </div>

    <div class="graph-card">
      <h2 class="graph-title">🧪 กราฟค่า pH</h2>
      <canvas id="phChart"></canvas>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right-panel">

    <div class="chat-card">

      <h2 style="color:#94a3b8;margin-bottom:10px;">🤖 AI Assistant</h2>

      <div id="chatBox"></div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="ถาม AI เกี่ยวกับตู้ปลา...">
        <button class="send-btn" onclick="sendMessage()">ส่ง</button>
      </div>

      <div class="quick-buttons">
        <button onclick="quickAsk('อุณหภูมิตอนนี้เป็นยังไง')">🌡 อุณหภูมิ</button>
        <button onclick="quickAsk('ค่า ph ตอนนี้เป็นยังไง')">🧪 pH</button>
        <button onclick="quickAsk('แนวโน้มของระบบเป็นยังไง')">📈 แนวโน้ม</button>
        <button onclick="quickAsk('ระบบกำลังทำงานปกติไหม')">⚙ ระบบ</button>
      </div>

    </div>

  </div>

</div>

<script>

// ===== SHEET =====
const sheetURL =
"https://docs.google.com/spreadsheets/d/1dRyT0iPaTrrxnfon_TEqO6rcdZSSHGwUGZG-H0KjZYQ/gviz/tq?tqx=out:csv";

let labels = [];
let temps = [];
let phs = [];

let tempChart;
let phChart;

async function loadData(){

  const res = await fetch(sheetURL);
  const text = await res.text();

  const rows = text.trim().split("\n");

  labels = [];
  temps = [];
  phs = [];

  for(let i=1;i<rows.length;i++){

    const cols = rows[i].split(",");

    const time = (cols[1] || "").replace(/"/g,'').trim();
    const temp = parseFloat(cols[2]);
    const ph = parseFloat(cols[3]);

    if(!isNaN(temp) && !isNaN(ph)){
      labels.push(time);
      temps.push(temp);
      phs.push(ph);
    }
  }

  document.getElementById("temp").innerHTML = `${temps.at(-1) ?? 0} °C`;
  document.getElementById("ph").innerHTML = `${phs.at(-1) ?? 0}`;
  document.getElementById("time").innerHTML = labels.at(-1) ?? "-";

  drawCharts();
}

function drawCharts(){

  if(tempChart) tempChart.destroy();
  if(phChart) phChart.destroy();

  const tempCtx = document.getElementById("tempChart").getContext("2d");
  const phCtx = document.getElementById("phChart").getContext("2d");

  tempChart = new Chart(tempCtx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"อุณหภูมิ (°C)",
        data:temps,
        borderColor:"#38bdf8",
        tension:0.4,
        pointRadius:0,
        borderWidth:3
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{ min:20, max:35 },
        x:{}
      }
    }
  });

  phChart = new Chart(phCtx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"pH",
        data:phs,
        borderColor:"#22c55e",
        tension:0.4,
        pointRadius:0,
        borderWidth:3
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{ min:0, max:14 },
        x:{}
      }
    }
  });
}

// ===== CHAT =====
function addMessage(sender,text,type){

  const chatBox = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = type;
  div.innerHTML = `<b>${sender}:</b> ${text}`;

  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function quickAsk(text){
  document.getElementById("userInput").value = text;
  sendMessage();
}

async function sendMessage(){

  const input = document.getElementById("userInput");
  const question = input.value;

  if(!question.trim()) return;

  addMessage("คุณ",question,"user-message");
  input.value="";

  addMessage("AI","กำลังวิเคราะห์...","ai-message");

  try{

    const res = await fetch("/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ question })
    });

    const data = await res.json();

    const chatBox = document.getElementById("chatBox");
    chatBox.removeChild(chatBox.lastChild);

    addMessage("AI",data.result,"ai-message");

  }catch(e){
    addMessage("AI","เชื่อมต่อ AI ไม่สำเร็จ","ai-message");
  }
}

document.getElementById("userInput")
.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

loadData();
setInterval(loadData,5000);

addMessage("AI","สวัสดี 😄 ผมคือ AI วิเคราะห์ตู้ปลา","ai-message");

</script>

</body>
</html>
