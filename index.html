<!DOCTYPE html>
<html lang="th">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Fish Tank Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body {

      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

   .card {

    background: #1e293b;
    width: 90%;
    max-width: 550px;
    margin: auto;
    padding: 20px;
    border-radius: 20px;
    margin-bottom: 30px;
  }

    h1 {

      color: #38bdf8;
    }

    h2 {

      color: #94a3b8;
    }

    .value {

      font-size: 32px;
      margin: 20px;
    }

    /* ===== กราฟ ===== */

    .graph-container {

      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .graph-card {

      position: relative;
      background: #1e293b;
      padding: 15px;
      border-radius: 20px;
      width: 420px;
    }

    .graph-card canvas {

      background: white;
      border-radius: 15px;
      padding: 10px;
    }

    .expand-btn {

      position: absolute;

      top: 15px;
      right: 15px;

      background: #38bdf8;

      border: none;

      color: white;

      padding: 8px 12px;

      border-radius: 10px;

      cursor: pointer;

      opacity: 0;

      transition: 0.3s;
    }

    .graph-card:hover .expand-btn {

      opacity: 1;
    }

    /* ===== Popup ===== */

    .modal {

      display: none;

      position: fixed;

      z-index: 999;

      left: 0;
      top: 0;

      width: 100%;
      height: 100%;

      background: rgba(0,0,0,0.8);
    }

    .modal-content {

      background: #1e293b;

      margin: 3% auto;

      padding: 20px;

      width: 90%;
      max-width: 1100px;

      border-radius: 20px;
    }

    .close {

      color: white;

      float: right;

      font-size: 30px;

      cursor: pointer;
    }

    #bigChart {

      background: white;
      border-radius: 20px;
      padding: 20px;
    }

    /* ===== AI CHAT ===== */

    .chat-card {

      background: #1e293b;

      width: 700px;

      max-width: 90%;

      margin: 30px auto;

      padding: 20px;

      border-radius: 20px;
    }

    #chatBox {

      height: 300px;

      overflow-y: auto;

      background: #0f172a;

      padding: 15px;

      border-radius: 15px;

      text-align: left;

      margin-bottom: 15px;
    }

    .user-message {

      margin-bottom: 12px;

      color: #38bdf8;
    }

    .ai-message {

      margin-bottom: 12px;

      color: #ffffff;
    }

    #userInput {

      width: 70%;

      padding: 12px;

      border-radius: 10px;

      border: none;

      outline: none;
    }

    .send-btn {

      padding: 12px 20px;

      border: none;

      border-radius: 10px;

      background: #38bdf8;

      color: white;

      cursor: pointer;

      margin-left: 10px;
    }

    .quick-buttons {

      margin-top: 15px;

      display: flex;

      justify-content: center;

      gap: 10px;

      flex-wrap: wrap;
    }

    .quick-buttons button {

      background: #334155;

      color: white;

      border: none;

      padding: 10px 15px;

      border-radius: 10px;

      cursor: pointer;
    }

  </style>

</head>

<body>

  <!-- ===== ค่าปัจจุบัน ===== -->

  <div class="card">

    <h1>ตู้ปลา IOT</h1>

    <h2>ค่ารายวัน</h2>

    <div class="value" id="temp">"🌡 -- °C</div>
    <div class="value" id="ph">🧪 --</div>

    <div id="time"></div>

  </div>

  <!-- ===== กราฟ ===== -->

  <div class="graph-container">

    <!-- TEMP -->

    <div class="graph-card">

      <button class="expand-btn"
              onclick="openModal('temp')">

        ขยาย
      </button>

      <canvas id="tempChart"></canvas>

    </div>

    <!-- PH -->

    <div class="graph-card">

      <button class="expand-btn"
              onclick="openModal('ph')">

        ขยาย
      </button>

      <canvas id="phChart"></canvas>

    </div>

  </div>

  <!-- ===== AI CHAT ===== -->

  <div class="chat-card">

    <h2>🤖 AI Assistant</h2>

    <div id="chatBox"></div>

    <input type="text"
           id="userInput"
           placeholder="ถามอะไรเกี่ยวกับตู้ปลา...">

    <button class="send-btn"
            onclick="sendMessage()">

      ส่ง
    </button>

    <!-- ปุ่มลัด -->

    <div class="quick-buttons">

      <button onclick="quickAsk('อุณหภูมิตอนนี้เป็นยังไง')">
        🌡 อุณหภูมิ
      </button>

      <button onclick="quickAsk('ค่า ph ตอนนี้เป็นยังไง')">
        🧪 pH
      </button>

      <button onclick="quickAsk('แนวโน้มของระบบเป็นยังไง')">
        📈 แนวโน้ม
      </button>

      <button onclick="quickAsk('ระบบกำลังทำงานปกติไหม')">
        ⚙ ระบบ
      </button>

    </div>

  </div>

  <!-- ===== Popup ===== -->

  <div id="graphModal"
       class="modal">

    <div class="modal-content">

      <span class="close"
            onclick="closeModal()">

        &times;
      </span>

      <canvas id="bigChart"></canvas>

    </div>

  </div>

  <script>

    // ===== CSV URL =====

    const sheetURL ="https://docs.google.com/spreadsheets/d/1dRyT0iPaTrrxnfon_TEqO6rcdZSSHGwUGZG-H0KjZYQ/gviz/tq?tqx=out:csv";

    // ===== Variables =====

    let labels = [];

    let temps = [];

    let phs = [];

    let tempChart;

    let phChart;

    let bigChart;

    // ===== โหลดข้อมูล =====

    async function loadData() {

      const response =
        await fetch(sheetURL);

      const text =
        await response.text();

      const rows =
        text.trim().split("\n");

      labels = [];
      temps = [];
      phs = [];

      for (let i = 1;
           i < rows.length;
           i++) {

        const cols =
          rows[i].split(",");

        const date =
          cols[0]
          .replace(/"/g, '')
          .trim();

        const time =
          cols[1]
          .replace(/"/g, '')
          .trim();

        const temp =
          parseFloat(
            cols[2]
            .replace(/"/g, '')
            .trim()
          );

        const ph =
          parseFloat(
            cols[3]
            .replace(/"/g, '')
            .trim()
          );

        if (!isNaN(temp) &&
            !isNaN(ph)) {

          labels.push(time);

          temps.push(temp);

          phs.push(ph);
        }

      }

      // ===== ค่าล่าสุด =====

      const lastTemp =
        temps[temps.length - 1];

      const lastPh =
        phs[phs.length - 1];

      const lastTime =
        labels[labels.length - 1];

      document
        .getElementById("temp")
        .innerHTML =
        `อุณหภูมิ:🌡 ${lastTemp} °C`;

      document
        .getElementById("ph")
        .innerHTML =
        `ค่าความเป็นกรด-ด่าง (pH):🧪 ${lastPh}`;

      document
        .getElementById("time")
        .innerHTML =
        `${lastTime}`;

      drawCharts();
    }

    // ===== วาดกราฟ =====

    function drawCharts() {

      // TEMP

      if (tempChart) {

        tempChart.destroy();
      }

      const tempCtx =
        document
        .getElementById("tempChart");

      tempChart =
        new Chart(tempCtx, {

          type: "line",

          data: {

            labels: labels,

            datasets: [{

              label: "อุณหภูมิ",

              data: temps,

              borderWidth: 2,

              tension: 0.3
            }]
          },

          options: {

            responsive: true,

            scales: {

              y: {

                beginAtZero: false
              }
            }
          }
        });

      // PH

      if (phChart) {

        phChart.destroy();
      }

      const phCtx =
        document
        .getElementById("phChart");

      phChart =
        new Chart(phCtx, {

          type: "line",

          data: {

            labels: labels,

            datasets: [{

              label: "ค่า pH",

              data: phs,

              borderWidth: 2,

              tension: 0.3
            }]
          },

          options: {

            responsive: true,

            scales: {

              y: {

                beginAtZero: false
              }
            }
          }
        });
    }

    // ===== Popup =====

    function openModal(type) {

      document
        .getElementById("graphModal")
        .style.display = "block";

      if (bigChart) {

        bigChart.destroy();
      }

      const ctx =
        document
        .getElementById("bigChart");

      let data;
      let label;

      if (type === "temp") {

        data = temps;

        label = "อุณหภูมิ";
      }

      else {

        data = phs;

        label = "ค่า pH";
      }

      bigChart =
        new Chart(ctx, {

          type: "line",

          data: {

            labels: labels,

            datasets: [{

              label: label,

              data: data,

              borderWidth: 3,

              tension: 0.3
            }]
          },

          options: {

            responsive: true
          }
        });
    }

    function closeModal() {

      document
        .getElementById("graphModal")
        .style.display = "none";
    }

    // ===== CHAT =====

    function addMessage(sender, text, type) {

      const chatBox =
        document.getElementById("chatBox");

      const div =
        document.createElement("div");

      div.className = type;

      div.innerHTML =
        `<b>${sender}:</b> ${text}`;

      chatBox.appendChild(div);

      chatBox.scrollTop =
        chatBox.scrollHeight;
    }

    // ===== Quick Ask =====

    function quickAsk(text) {

      document
        .getElementById("userInput")
        .value = text;

      sendMessage();
    }

    // ===== AI CHAT =====

    async function sendMessage() {

      const input =
        document.getElementById("userInput");

      const question =
        input.value;

      if (question.trim() === "")
        return;

      // ===== ข้อความผู้ใช้ =====

      addMessage(
        "คุณ",
        question,
        "user-message"
      );

      input.value = "";

      // ===== AI กำลังคิด =====

      addMessage(
        "AI",
        "กำลังวิเคราะห์ข้อมูล...",
        "ai-message"
      );

      try {

        const response =
          await fetch(
            "/chat",
            {

              method: "POST",

              headers: {

                "Content-Type":
                  "application/json"

              },

              body: JSON.stringify({

                question: question,

                temps: temps,

                phs: phs,

                times: labels

              })

            }
          );

        const data =
          await response.json();

        // ===== ลบข้อความกำลังคิด =====

        const chatBox =
          document.getElementById(
            "chatBox"
          );

        chatBox.removeChild(
          chatBox.lastChild
        );

        // ===== ตอบกลับ =====

        addMessage(
          "AI",
          data.result,
          "ai-message"
        );

      }

      catch(err) {

        console.log(err);

        addMessage(
          "AI",
          "เชื่อมต่อ AI ไม่สำเร็จ",
          "ai-message"
        );

      }

    }

    // ===== Enter Key =====

    document
      .getElementById("userInput")
      .addEventListener("keypress",
      function(event) {

        if (event.key === "Enter") {

          sendMessage();
        }
      });

    // ===== โหลดครั้งแรก =====

    loadData();

    // ===== โหลดใหม่ทุก 5 วิ =====

    setInterval(loadData, 5000);

    // ===== ข้อความเริ่มต้น =====

    addMessage(
      "AI",
      "สวัสดี 😄 ผมคือ AI วิเคราะห์ตู้ปลา คุณสามารถถามเกี่ยวกับอุณหภูมิ pH แนวโน้ม หรือการคาดการณ์ได้",
      "ai-message"
    );

  </script>

</body>

</html>
